name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Reject public-prefixed server secrets
        run: |
          if git grep -nE 'NEXT_PUBLIC_(TMDB_API_(TOKEN|KEY)|SUPABASE_(SECRET_KEY|SERVICE_ROLE_KEY))'; then
            echo "Server secrets must never use the NEXT_PUBLIC_ prefix."
            exit 1
          fi
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
