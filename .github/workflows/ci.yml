name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Reject public-prefixed server secrets
        run: |
          if git grep -nE 'NEXT_PUBLIC_(TMDB_API_(TOKEN|KEY)|SUPABASE_(SECRET_KEY|SERVICE_ROLE_KEY))'; then
            echo "Server secrets must never use the NEXT_PUBLIC_ prefix."
            exit 1
          fi
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
